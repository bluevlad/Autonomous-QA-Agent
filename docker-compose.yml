services:
  server:
    build: ./dashboard/server
    container_name: qa-dashboard-server
    restart: unless-stopped
    ports:
      - "3091:3091"
    volumes:
      - ./scheduler/logs:/data/logs:ro
    environment:
      - PORT=3091
      - LOGS_DIR=/data/logs

  client:
    build: ./dashboard/client
    container_name: qa-dashboard-client
    restart: unless-stopped
    ports:
      - "4091:4091"
    depends_on:
      - server
