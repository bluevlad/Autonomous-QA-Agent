name: QA Daily Check

on:
  schedule:
    - cron: '0 13 * * *'  # 22:00 KST = 13:00 UTC
  workflow_dispatch:        # 수동 실행

jobs:
  qa-check:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Run QA scheduler
        env:
          NODE_ENV: production
          GH_TOKEN: ${{ secrets.QA_PAT }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          UNMONG_MAIN_URL: ${{ secrets.UNMONG_MAIN_URL }}
          HOPENVISION_URL: ${{ secrets.HOPENVISION_URL }}
          HOPENVISION_API_URL: ${{ secrets.HOPENVISION_API_URL }}
          ALLERGYINSIGHT_URL: ${{ secrets.ALLERGYINSIGHT_URL }}
          ALLERGYINSIGHT_API_URL: ${{ secrets.ALLERGYINSIGHT_API_URL }}
          NEWSLETTERPLATFORM_URL: ${{ secrets.NEWSLETTERPLATFORM_URL }}
          STANDUP_API_URL: ${{ secrets.STANDUP_API_URL }}
        run: npm run scheduler:run

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-logs-${{ github.run_number }}
          path: scheduler/logs/
          retention-days: 30
