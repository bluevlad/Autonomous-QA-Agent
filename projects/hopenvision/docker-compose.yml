services:
  # Spring Boot API (docker compose --profile all up -d)
  hopenvision-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: hopenvision-api
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/hopenvision
      DB_USERNAME: postgres
      DB_PASSWORD: ***REMOVED***
      CORS_ALLOWED_ORIGINS: http://localhost:4060,http://localhost:5173,http://localhost:3000
      TZ: Asia/Seoul
    ports:
      - "9050:8080"
    networks:
      - database-network
    profiles:
      - all

  # React Frontend + Nginx (docker compose --profile all up -d)
  hopenvision-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: hopenvision-web
    ports:
      - "4060:80"
    depends_on:
      - hopenvision-api
    networks:
      - database-network
    profiles:
      - all

networks:
  database-network:
    external: true
